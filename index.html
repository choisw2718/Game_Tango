<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tango</title>
    <link rel="stylesheet" href="./assets/web/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Tango puzzle</p>
          <h1>Tango</h1>
        </div>
        <button class="menu-tab is-active" id="menuButton" type="button">게임 선택</button>
      </header>

      <section class="screen menu-screen" id="menuScreen" aria-label="메뉴">
        <div class="menu-hero">
          <div class="menu-copy">
            <span class="step-label">게임 선택</span>
            <h2>오늘 풀 Tango를 고르세요</h2>
            <p>크기와 난이도를 선택하면 이어서 플레이할 Stage 목록이 열립니다.</p>
          </div>
          <div class="menu-preview" aria-hidden="true">
            <span class="preview-cell filled"></span>
            <span class="preview-cell"></span>
            <span class="preview-cell hollow"></span>
            <span class="preview-cell filled"></span>
            <span class="preview-cell hollow"></span>
            <span class="preview-cell"></span>
            <span class="preview-mark equal">=</span>
            <span class="preview-mark cross">x</span>
          </div>
        </div>
        <div class="choice-grid" id="choiceGrid"></div>
        <p class="status" id="menuStatus" aria-live="polite"></p>
      </section>

      <section class="screen stage-screen is-hidden" id="stageScreen" aria-label="Stage 목록">
        <div class="screen-head">
          <div>
            <span class="step-label">2단계</span>
            <h2 id="selectedPackTitle">Stage</h2>
            <p class="screen-meta" id="selectedPackMeta"></p>
          </div>
          <button class="secondary-button compact-button" id="backToMenuButton" type="button">
            게임 선택
          </button>
        </div>
        <div class="stage-grid" id="stageGrid"></div>
        <p class="status" id="stageStatus" aria-live="polite"></p>
      </section>

      <section class="screen game-screen is-hidden" id="gameScreen" aria-label="문제 풀이">
        <div class="game-head">
          <div>
            <span class="step-label">플레이</span>
            <p class="puzzle-meta" id="puzzleMeta"></p>
          </div>
          <p class="timer-text" id="timerText">풀이 시간 0:00</p>
        </div>

        <section class="game-actions" aria-label="Game controls">
          <button class="secondary-button" id="backToStagesButton" type="button">
            Stage 목록
          </button>
          <button class="primary-button next-button" id="nextStageButton" type="button" disabled>
            다음 Stage
          </button>
        </section>

        <section class="board-section" aria-label="Tango board">
          <div class="board-frame" id="boardFrame">
            <div class="board-grid" id="boardGrid"></div>
            <div class="condition-layer" id="conditionLayer"></div>
          </div>
        </section>

        <div class="board-feedback">
          <p class="status status-panel" id="statusText" aria-live="polite"></p>
          <p class="hint-text" id="hintText" aria-live="polite"></p>
        </div>

        <section class="tool-panel" aria-label="Puzzle tools">
          <button class="tool-button" id="hintButton" type="button" disabled>
            힌트
          </button>
          <button class="secondary-button" id="resetButton" type="button" disabled>
            보드 비우기
          </button>
          <button class="secondary-button" id="checkpointSaveButton" type="button" disabled>
            체크포인트 저장
          </button>
          <button class="secondary-button" id="checkpointRestoreButton" type="button" disabled>
            체크포인트 복원
          </button>
        </section>
      </section>
    </main>

    <script type="module" src="./assets/web/app.js"></script>
  </body>
</html>
